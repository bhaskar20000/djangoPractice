<!DOCTYPE html>
<html>
<head>
    <title>My Blog - Contact</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }
        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            color: #00adb5;
        }
        .container {
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>

   <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/contacts/">Contact</a>

        {% if user.is_authenticated %}
            <span style="color:white; margin-left:20px;">
                Hello, {{ user.username }}
            </span>
            <a href="/users/logout/">Logout</a>
        {% else %}
            <a href="/users/login/">Login</a>
            <a href="/users/register/">Register</a>
        {% endif %}
    </nav>

    <div class="container">
        <h1>Contact Us</h1>
        <p>This is the contact page of my blog.</p>
    </div>

</body>
</html>
